name: Deploy Sanctum Backend

on:
  push:
    branches:
      - main
    paths:
      - 'vault-backend/**'
      - 'docker-compose.prod.yml'
      - '.github/workflows/deploy.yml'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/sanctum-backend

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build with Maven
        run: |
          cd vault-backend
          mvn clean package -DskipTests -B

  build-and-push-docker:
    needs: build-and-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build and Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./vault-backend
          file: ./vault-backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    needs: build-and-push-docker
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Copy Files to Deployment Directory
        run: |
          mkdir -p ~/sanctum
          cp docker-compose.prod.yml ~/sanctum/
          cp deploy.sh ~/sanctum/
          chmod +x ~/sanctum/deploy.sh

      - name: Deploy Containers on Server
        run: |
          cd ~/sanctum
          # Log in to GHCR to pull packages
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          # Pull backend image
          docker compose -f docker-compose.prod.yml pull backend
          # Restart services
          docker compose -f docker-compose.prod.yml up -d
          # Clean up old images
          docker image prune -af
