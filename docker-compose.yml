version: '3.8'

services:
  db:
    image: postgres:15
    container_name: vault_postgres
    restart: always
    environment:
      POSTGRES_DB: vault_db
      POSTGRES_USER: vault_user
      POSTGRES_PASSWORD: vault_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vault_user -d vault_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: vault_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    container_name: vault_ollama
    restart: always
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    # If the user has GPU, they can configure it. By default, it runs on CPU which works everywhere.

  ollama-pull-model:
    image: ollama/ollama:latest
    container_name: vault_ollama_pull_model
    environment:
      - OLLAMA_HOST=http://ollama:11434
    command: pull llama3.2
    depends_on:
      - ollama

  backend:
    build:
      context: ./vault-backend
      dockerfile: Dockerfile
    container_name: vault_backend
    restart: always
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/vault_db
      SPRING_DATASOURCE_USERNAME: vault_user
      SPRING_DATASOURCE_PASSWORD: vault_pass
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      SPRING_FLYWAY_ENABLED: "true"
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      JWT_SECRET: "9f82d1c6e4b3a2f1c0d9e8f7a6b5c4d3e2f1a0b9c8d7e6f5a4b3c2d1e0f9a8b7"
      VAULT_ENCRYPTION_KEY: "my-secure-vault-encryption-key-aes"
      OLLAMA_HOST: "http://ollama:11434"
      OLLAMA_MODEL: "llama3.2" # default model, lightweight
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_started

volumes:
  postgres_data:
  redis_data:
  ollama_data:
